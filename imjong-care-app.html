<head><script data-od-sandbox-shim>(function(){
  function makeStore(){
    var data = {};
    var api = {
      getItem: function(k){ return Object.prototype.hasOwnProperty.call(data, k) ? data[k] : null; },
      setItem: function(k, v){ data[k] = String(v); },
      removeItem: function(k){ delete data[k]; },
      clear: function(){ data = {}; },
      key: function(i){ return Object.keys(data)[i] || null; }
    };
    Object.defineProperty(api, 'length', { get: function(){ return Object.keys(data).length; } });
    return api;
  }
  function tryShim(name){
    var works = false;
    try { works = !!window[name] && typeof window[name].getItem === 'function'; void window[name].length; }
    catch (_) { works = false; }
    if (works) return;
    try { Object.defineProperty(window, name, { configurable: true, value: makeStore() }); }
    catch (_) { try { window[name] = makeStore(); } catch (__) {} }
  }
  tryShim('localStorage');
  tryShim('sessionStorage');
  document.addEventListener('click', (e) => {
    if (!e.target || !(e.target instanceof Element)) return;
    var link = e.target.closest('a[href]');
    if (!link) return;
    var href = link.getAttribute('href');
    if (href === null) return;
    var isAnchor = href.startsWith('#') || href === '';
    if (isAnchor) {
      e.preventDefault();
      if (href === '' || href === '#') {
        window.scrollTo({ top: 0 });
        history.replaceState(null, '', ' ');
      } else {
        var targetId = href.slice(1);
        var target = targetId ? document.getElementById(targetId) : null;
        if (target) {
          target.scrollIntoView();
          location.hash === href && history.replaceState(null, '', ' ');
          location.hash = href;
        }
      }
    } else if (link.getAttribute('target') === '_blank') {
      e.preventDefault();
      let safe = false;
      try {
        var url = new URL(href, location.href);
        safe =
          url.protocol === 'http:' ||
          url.protocol === 'https:' ||
          url.protocol === 'mailto:';
      } catch (_) {}
      safe && window.open(href, '_blank', 'noopener,noreferrer');
    }
  });
})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imjong Care — 기록</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Noto+Serif+KR:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: hsl(38, 40%, 96%);
            --surface: hsl(0, 0%, 100%);
            --accent: hsl(24, 25%, 35%);
            --text-primary: hsl(24, 20%, 15%);
            --text-secondary: hsl(24, 15%, 45%);
            --border: hsla(24, 25%, 35%, 0.3);
            --font-display: 'Cormorant Garamond', serif;
            --font-body: 'Noto Serif KR', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: var(--font-body);
            overflow: hidden;
        }

        #root {
            display: flex;
            flex-direction: column;
            height: 100%;
            flex: 1;
            max-width: 430px; /* Standard mobile width */
            margin: 0 auto;
            position: relative;
            background-color: var(--bg);
            box-shadow: 0 0 50px rgba(0,0,0,0.02);
        }

        header {
            padding: 3rem 2rem 1.5rem;
            text-align: center;
        }

        .header-title {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--accent);
            letter-spacing: 0.05em;
            word-spacing: 0.1em;
        }

        .card-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1500px;
            padding: 1.5rem;
        }

        .will-card {
            width: 100%;
            height: 100%;
            max-height: 500px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px; /* Postcard style usually has sharp or slightly rounded corners */
            position: relative;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
            backdrop-filter: blur(5px);
            background: rgba(255, 255, 255, 0.85);
        }

        .will-card::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px solid hsla(24, 25%, 35%, 0.1);
            pointer-events: none;
        }

        .card-content {
            font-size: 1.25rem;
            line-height: 2;
            color: var(--text-primary);
            word-break: keep-all;
            font-weight: 300;
        }

        .card-footer {
            margin-top: 3rem;
            font-family: var(--font-display);
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        .controls {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-btn {
            background: none;
            border: none;
            font-family: var(--font-display);
            font-size: 1.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: color 0.3s;
        }

        .nav-btn:hover {
            color: var(--accent);
        }

        .add-btn {
            background: none;
            border: 1px solid var(--border);
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            font-family: var(--font-body);
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
        }

        .add-btn:hover {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        /* Page Flip Logic */
        .card-container.flipping .will-card {
            transform: rotateY(-180deg) translateX(-100%) scale(0.9);
            opacity: 0;
        }

        .card-container.entering .will-card {
            transform: rotateY(180deg) translateX(100%) scale(0.9);
            opacity: 0;
        }

        /* Responsive */
        @media (min-width: 431px) {
            #root {
                height: 90vh;
                margin: 5vh auto;
                border-radius: 30px;
                overflow: hidden;
            }
        }
    </style>
</head>
<body>
    <div id="root">
        <header>
            <h1 class="header-title">마지막 장을 기록하다</h1>
        </header>

        <main class="card-container" id="cardContainer">
            <div class="will-card" id="willCard">
                <p class="card-content" id="cardText">
                    우리가 함께한 소중한 시간들을<br>
                    따뜻한 기억으로 간직해주렴.
                </p>
                <div class="card-footer">— Imjong Care</div>
            </div>
        </main>

        <footer class="controls">
            <button class="nav-btn" onclick="prevCard()">&lt;</button>
            <button class="add-btn" onclick="addCard()">+ 카드 추가</button>
            <button class="nav-btn" onclick="nextCard()">&gt;</button>
        </footer>
    </div>

    <script>
        const cards = [
            "우리가 함께한 소중한 시간들을\n따뜻한 기억으로 간직해주렴.",
            "부족한 나를 늘 응원해주고\n사랑해줘서 정말 고마웠어.",
            "슬퍼하기보다는 우리가 나눈\n웃음들을 떠올려주길 바란다.",
            "너희의 앞날에 늘 햇살 같은\n평온함이 가득하기를 빌게."
        ];
        let currentIndex = 0;

        function updateCard(direction) {
            const container = document.getElementById('cardContainer');
            const cardText = document.getElementById('cardText');
            
            container.classList.add(direction === 'next' ? 'flipping' : 'entering');
            
            setTimeout(() => {
                if (direction === 'next') {
                    currentIndex = (currentIndex + 1) % cards.length;
                } else {
                    currentIndex = (currentIndex - 1 + cards.length) % cards.length;
                }
                
                cardText.innerText = cards[currentIndex];
                container.classList.remove('flipping', 'entering');
            }, 600);
        }

        function nextCard() {
            updateCard('next');
        }

        function prevCard() {
            updateCard('prev');
        }

        function addCard() {
            // In a real environment, this would navigate to the editor screen
            console.log('Navigating to editor...');
        }

        // Tap card to flip next
        document.getElementById('willCard').onclick = nextCard;
    </script>
</body>
</html>
